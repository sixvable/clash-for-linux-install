# ============================================================
# mixin.yaml — clash-for-linux-install 自定义混入配置
# ============================================================
# 本文件为 clash-for-linux-install 的 Mixin 配置模板（增强版）。
#
# 【override 全量覆盖说明】（需配合本仓库 clashctl.sh 新版逻辑）
#   - rules.override / proxies.override / proxy-groups.override
#     若列表 非空，则直接全量替换订阅原始内容，忽略订阅自带的同类字段。
#   - 若 override 为空（注释掉或留空），则自动回退到订阅原始内容。
#   - 语法：override // ($config.xxx // [])
#     兼容较旧版本的 yq，无需 if/then/else。
#
# 【与脚本的关系】
#   - clashctl.sh 的 _merge_config() 函数执行深度合并后，
#     依次处理 rules / proxies / proxy-groups 的 prefix/override/suffix。
#   - prefix/suffix 无论 override 是否有值，始终拼接在两端。
#   - inject (仅 proxy-groups) 按 name 追加 proxy 到已有分组，与 override 互不干扰。
#
# 【字段说明】
#   prefix：前置插入（追加到列表头部）
#   suffix：后置插入（追加到列表尾部）
#   override：有内容时全量替换全部原项（忽略订阅原始内容）
#   inject (仅 proxy-groups)：按 name 匹配，把指定 proxy 追加到已有 group 的 .proxies 列表
#
# 【external-ui-url 说明】
#   使用 https://ghfast.top 加速镜像下载 GitHub 资源，避免直连 GitHub 超时。
# ============================================================

_custom:
  system-proxy:
    enable: true

mixed-port: 7890

external-controller: "0.0.0.0:9090"
external-ui: dist
# ghfast.top 镜像加速 GitHub releases 资源下载
external-ui-url: https://ghfast.top/https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
secret:

allow-lan: false # 若开启务必设置用户验证以防暴露公网后被滥用
# authentication:
  # - "username:password" # 用户验证（clashon 会自动填充）

