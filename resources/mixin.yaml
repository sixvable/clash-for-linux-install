  # inject 示例：把自定义的 "我的链式代理" 注入到订阅的 "♻️ 手动切换" 组里
  # 这样无需 override 整组就能在 dashboard 上选中它
  # inject:
  #   "♻️ 手动切换":
  #     - "我的链式代理"

# tun 配置
tun:
  enable: false
  stack: system
  auto-route: true
  auto-redir: true # clash
  auto-redirect: true # mihomo
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true
  route-exclude-address:
    - 1.1.1.1/32 # 用于 clashui 获取真实内网 IP
    - 127.0.0.1/32
  exclude-interface:
    - docker0 # 避免无法访问容器内服务
    - podman0 # 详见：https://github.com/sixvable/clash-for-linux-install/issues/100#issuecomment-2995667368

# DNS 配置
dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  # 避免在启用 Tun + dns-hijack 时将代理节点域名解析为 fake-ip。
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - 114.114.114.114
    - 8.8.8.8

