# ============================================================
# rules：路由规则
# override 非空 → 全量替换订阅原始 rules（忽略机场自带规则）
# override 为空 → 回退到 prefix + 订阅原始 rules + suffix
# ============================================================
rules:
  prefix:
    - DOMAIN,api64.ipify.org,DIRECT # 用于 clashui 获取真实公网 IP
    # - DOMAIN-KEYWORD,github,proxy   # 用于 clashupgrade 升级内核
  suffix:
  # 启用下方 override 后，订阅原始规则将被完全忽略
  override:
    - DOMAIN,api64.ipify.org,DIRECT # 用于 clashui 获取真实公网 IP
    - RULE-SET,LAN,DIRECT
    - RULE-SET,Direct,DIRECT
    - RULE-SET,Reject,AdBlock
    - GEOSITE,category-scholar-cn,DIRECT
    - GEOSITE,category-scholar-!cn,Scholar_NoCN
    - GEOSITE,apple-intelligence,Apple Intelligence
    - DOMAIN,guzzoni.apple.com,Apple Intelligence
    - DOMAIN-SUFFIX,smoot.apple.com,Apple Intelligence
    - DOMAIN,cp4.cloudflare.com,Apple Intelligence
    - RULE-SET,AI,AI
    - RULE-SET,Apple,Apple
    - RULE-SET,OneDrive,OneDrive
    - DOMAIN-SUFFIX,wns.windows.com,OneDrive
    - DOMAIN,officeclient.microsoft.com,OneDrive
    - DOMAIN,g.live.com,OneDrive
    - DOMAIN-SUFFIX,svc.ms,OneDrive
    - DOMAIN-SUFFIX,officeapps.live.com,OneDrive
    - DOMAIN-SUFFIX,online.office.com,OneDrive
    - DOMAIN,office.live.com,OneDrive
    - DOMAIN-SUFFIX,office.net,OneDrive
    - DOMAIN,apis.live.net,OneDrive
    - DOMAIN-SUFFIX,events.data.microsoft.com,OneDrive
    - DOMAIN-SUFFIX,aria.microsoft.com,OneDrive
    - DOMAIN-SUFFIX,officecdn.microsoft.com,OneDrive
    - DOMAIN-SUFFIX,officecdn.microsoft.com.edgesuite.net,OneDrive
    - DOMAIN-SUFFIX,msocdn.com,OneDrive
    - RULE-SET,YouTube,YouTube
    - RULE-SET,Netflix,NETFLIX
    - RULE-SET,Disney,Disney+
    - RULE-SET,HBO,HBO
    - RULE-SET,PrimeVideo,PrimeVideo
    - RULE-SET,Spotify,Spotify
    - RULE-SET,TikTok,TikTok
    - RULE-SET,Emby,Emby
    - RULE-SET,Bahamut,Bahamut
    - RULE-SET,BiliBiliIntl,BiliBiliIntl
    - RULE-SET,bilibili,bilibili
    - RULE-SET,NetEaseMusic,NetEaseMusic
    - RULE-SET,WeChat,WeChat
    - RULE-SET,Telegram,Telegram
    - RULE-SET,GitHub,GitHub
    - RULE-SET,Google,Google
    - RULE-SET,Twitter,X
    - RULE-SET,PayPal,PayPal
    - RULE-SET,Game,Games
    - RULE-SET,ProxyMedia,Streaming
    - RULE-SET,Microsoft,Microsoft
    - RULE-SET,Proxy,Proxy
    - RULE-SET,ProxyGFW,Proxy
    - RULE-SET,ChinaDomain,DIRECT
    - RULE-SET,ChinaIP,DIRECT
    - GEOIP,CN,DIRECT
    - MATCH,Final

# ============================================================
# proxies：节点列表
# override 非空 → 全量替换（通常留空，由订阅提供节点）
# ============================================================
proxies:
  prefix:
  suffix:
  override:

# ============================================================
# proxy-groups：策略组
# override 非空 → 全量替换订阅原始策略组（包括自动测速、分区等）
# override 为空 → 回退到 prefix + 订阅原始 proxy-groups + suffix
# inject (仅 proxy-groups)：按 name 追加 proxy 到已有分组，不受 override 影响
