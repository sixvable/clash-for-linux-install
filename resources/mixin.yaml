        - Proxy
        - AllServer
    - name: Proxy
      type: select
      icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Rocket.png
      proxies:
        - DIRECT
        - HongKong
        - TaiWan
        - Japan
        - Singapore
        - America
        - AllServer
    - name: AdBlock
